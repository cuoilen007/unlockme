<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Unlock My Heart</title>

<style>

body{
font-family:Arial;
background:#fff5f8;
margin:0;
text-align:center;
}

.container{
width:700px;
margin:auto;
padding:40px;
}

button{
padding:12px 20px;
border:none;
background:#ff6fa5;
color:white;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

.node{
background:white;
padding:20px;
margin:10px;
border-radius:10px;
cursor:pointer;
}

.locked{
opacity:0.4;
cursor:not-allowed;
}

.quest{
background:white;
padding:25px;
border-radius:12px;
margin-top:20px;
}

.memory{
background:#ffe8f0;
padding:20px;
border-radius:12px;
margin-top:20px;
}

textarea{
width:90%;
padding:10px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>💌 Unlock My Heart</h1>

<div id="game"></div>

</div>

<script>

let quest = Number(localStorage.getItem("quest")) || 1
//let unlock = Number(localStorage.getItem("unlock")) || 0
let unlock = 1

intro()

function intro(){

document.getElementById("game").innerHTML=`

<div class="quest">

<h2>⚠ Warning</h2>

<p>This game contains:</p>
<p>• emotional damage</p>
<p>• overthinking</p>
<p>• possible rejection</p>

<button onclick="renderMap()">Continue</button>

</div>

`

}

function renderMap(){

let html=""

for(let i=1;i<=5;i++){

if(i<quest){

html+=`<div class="node">✔ Quest ${i}</div>`

}

else if(i==quest){

if(Date.now()<unlock){

html+=`<div class="node locked">Quest ${i}</div>`

}else{

html+=`<div class="node" onclick="openQuest(${i})">Quest ${i}</div>`

}

}

else{

html+=`<div class="node locked">Quest ${i}</div>`

}

}

html+=`<div id="timer"></div>`

document.getElementById("game").innerHTML=html

timer()

}

function openQuest(id){

if(id==1) quest1()
if(id==2) quest2()
if(id==3) quest3()
if(id==4) quest4()
if(id==5) quest5()

}

function completeQuest(){

quest++

localStorage.setItem("quest",quest)

let next=Date.now()+000000

localStorage.setItem("unlock",next)

unlock=next

showMemory()

}

function showMemory(){

let memories={

2:`Memory Unlocked

Chị không nghĩ
em lại nhớ mấy chi tiết nhỏ này.

Có vẻ em cũng để ý chị thật.`,

3:`Memory Unlocked

Hôm đó em làm chị cười rất nhiều.

Chị không nói thôi,
nhưng chị nhớ.`,

4:`Memory Unlocked

Chị bắt đầu tự hỏi
tại sao em kiên nhẫn vậy.`,

5:`Memory Unlocked

Maybe em thật sự nghiêm túc.`,

6:`Memory Unlocked

Em đã đi đến đây rồi.

Chị khá tò mò
em sẽ nói gì tiếp theo.`

}

document.getElementById("game").innerHTML=`

<div class="memory">

${memories[quest]}

</div>

<button onclick="renderMap()">Back to map</button>

`

}

function quest1(){

document.getElementById("game").innerHTML=`

<div class="quest">

<h2>Quest 1 — Bạn hiểu tôi đến đâu?</h2>

<form id="quiz">

<p>1. Món tôi thích nhất?</p>

<label><input type="radio" name="q1" value="0"> Bạc Xỉu muối</label><br>
<label><input type="radio" name="q1" value="0"> Cà phê muối</label><br>
<label><input type="radio" name="q1" value="0"> Trà sữa</label><br>
<label><input type="radio" name="q1" value="1"> Trà Nhãn Lài</label>

<p>2. Tôi ghét điều gì nhất?</p>

<label><input type="radio" name="q2" value="0"> Bị trễ giờ</label><br>
<label><input type="radio" name="q2" value="1"> Người nói dối</label><br>
<label><input type="radio" name="q2" value="0"> Người im lặng</label><br>
<label><input type="radio" name="q2" value="0"> Người EQ thấp</label>

<p>3. Tôi thích đi đâu nhất?</p>

<label><input type="radio" name="q3" value="0"> Cafe</label><br>
<label><input type="radio" name="q3" value="0"> Đi Mall</label><br>
<label><input type="radio" name="q3" value="0"> Du lịch</label><br>
<label><input type="radio" name="q3" value="1"> Nhà</label>

<p>4. Tôi thường ngủ lúc mấy giờ?</p>

<label><input type="radio" name="q4" value="0"> 24:00</label><br>
<label><input type="radio" name="q4" value="0"> 01:00</label><br>
<label><input type="radio" name="q4" value="1"> 02:00</label><br>
<label><input type="radio" name="q4" value="0"> 03:00</label>

<br><br>

<button type="button" onclick="checkQuiz()">Submit</button>

</form>

</div>

`

}

function checkQuiz(){

let q1=document.querySelector('input[name="q1"]:checked')
let q2=document.querySelector('input[name="q2"]:checked')
let q3=document.querySelector('input[name="q3"]:checked')
let q4=document.querySelector('input[name="q4"]:checked')

if(!q1||!q2||!q3||!q4){

alert("Hãy trả lời tất cả câu hỏi")

return

}

let score=
Number(q1.value)+
Number(q2.value)+
Number(q3.value)+
Number(q4.value)

if(score===4){

completeQuest()

}else{

alert("Sai rồi 😏 Hãy thử lại sau 24h")

let next=Date.now()+72000000

localStorage.setItem("unlock",next)

unlock=next

renderMap()

}

}

function quest2(){

document.getElementById("game").innerHTML=`

<div class="quest">

<h2>Quest 2</h2>

<p>Decode:</p>

<p>3-1-9 3-1-25 4-1-21 18-15-9</p>

<input id="ans">

<button onclick="checkPuzzle()">Submit</button>

</div>

`

}

function checkPuzzle(){

let v=document.getElementById("ans").value.toLowerCase()

if(v.includes("cái cây đâu rồi")){

completeQuest()

}else{

alert("Sai rồi")

}

}

function quest3(){

document.getElementById("game").innerHTML=`

<div class="quest">

<h2>Quest 3</h2>

<p>Chụp ảnh 3 nơi chúng ta từng gặp nhau và đăng story.</p>

<button onclick="completeQuest()">Tôi đã đăng story</button>

</div>

`

}

function quest4(){

document.getElementById("game").innerHTML=`

<div class="quest">

<h2>Quest 4</h2>

<p>Tạo một bất ngờ thật lớn cho chị rồi quay lại đây.</p>

<button onclick="completeQuest()">Done</button>

</div>

`

}

function quest5(){

document.getElementById("game").innerHTML=`

<div class="quest">

<h2>Quest 5</h2>

<p>Viết 100 lý do em thích chị qua zalo.</p>

<button onclick="checkReasons()">Em đã gửi</button>

</div>

`

}

function checkReasons(){


ending()

}

function ending(){

document.getElementById("game").innerHTML=`

<div class="quest">

<h2>🔐 Secret Ending</h2>

<p>You really tried.</p>

<p>That means something.</p>

<p>Chị thấy em đã cố gắng rất nhiều.</p>

<p>Chị nghĩ cũng đã đủ để mình bước sang một chặng đường mới với đầy đủ ý nghĩa của nó.</p>

<p>Chị không hứa sẽ trở thành một người thật hoàn hảo nhưng chị sẽ cố gắng thay đổi phù hợp cho một chặng đường thật dài, thật đong đầy.</p>

<p>Cám ơn em đã xuất hiện.</p>

<p>Giờ thì em có thể làm gì đó để nhận được câu đồng ý rồi.</p>


</div>

`

}


function timer(){

setInterval(()=>{

if(!unlock) return

let diff=unlock-Date.now()

//if(diff<=0) return

let h=Math.floor(diff/1000/60/60)
let m=Math.floor(diff/1000/60%60)

document.getElementById("timer").innerHTML=

"Quest tiếp theo mở sau "+h+"h "+m+"m"

},1000)

}

</script>

</body>
</html>
